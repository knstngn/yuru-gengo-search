<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>検索結果 — ゆる言語学ラジオ 字幕検索</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #fff;
      color: #222;
    }

    /* ヘッダー */
    header {
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header a {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }

    header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
    }

    /* 検索バー */
    .search-area {
      max-width: 720px;
      margin: 28px auto 0;
      padding: 0 24px;
      display: flex;
      gap: 8px;
    }

    .search-area input {
      flex: 1;
      padding: 11px 14px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
      font-family: inherit;
    }

    .search-area input:focus {
      border-color: #555;
    }

    .search-area button {
      padding: 11px 20px;
      font-size: 0.95rem;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }

    .search-area button:hover {
      background: #444;
    }

    /* 件数 */
    #stats {
      max-width: 720px;
      margin: 14px auto 0;
      padding: 0 24px;
      font-size: 0.82rem;
      color: #888;
    }

    /* グリッド */
    #results {
      max-width: 720px;
      margin: 20px auto 80px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    /* 動画カード */
    .card {
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      border-color: #aaa;
    }

    .card img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      background: #f0f0f0;
    }

    .card-body {
      padding: 10px 12px;
    }

    .card-title {
      font-size: 0.88rem;
      line-height: 1.5;
      font-weight: 600;
    }

    /* プレースホルダー */
    .placeholder {
      grid-column: 1 / -1;
      text-align: center;
      color: #bbb;
      padding: 80px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html">
      <img src="logo.jpg" alt="ゆる言語学ラジオ">
      <h1>ゆる言語学ラジオ 字幕検索</h1>
    </a>
  </header>

  <div class="search-area">
    <input type="text" id="query" autocomplete="off">
    <button id="search-btn">検索</button>
  </div>
  <div id="stats"></div>
  <div id="results"><p class="placeholder">読み込み中…</p></div>

  <script>
    let VIDEOS = [];  // [{id, title}]
    let NGRAMS = {};  // {bigram: [videoIndex, ...]}

    function getQuery() {
      return new URLSearchParams(location.search).get("q") || "";
    }

    async function loadIndex() {
      const [vRes, nRes] = await Promise.all([
        fetch("videos.json"),
        fetch("ngrams.json"),
      ]);
      [VIDEOS, NGRAMS] = await Promise.all([vRes.json(), nRes.json()]);
    }

    function normalize(s) {
      // カタカナ→ひらがな変換（ァ=0x30A1, ヶ=0x30F6）
      return s.replace(/[ァ-ヶ]/g, ch =>
        String.fromCharCode(ch.charCodeAt(0) - 0x60)
      );
    }

    function getNgrams(s, n = 2) {
      s = normalize(s);
      const result = new Set();
      for (let i = 0; i <= s.length - n; i++) result.add(s.slice(i, i + n));
      return [...result];
    }

    function searchTerm(term) {
      const ngs = getNgrams(term, 2);
      if (ngs.length === 0) {
        // 1文字以下: タイトルのみで絞る
        return new Set(
          VIDEOS.map((v, i) => v.title.includes(term) ? i : -1).filter(i => i >= 0)
        );
      }
      let matches = new Set(NGRAMS[ngs[0]] || []);
      for (const ng of ngs.slice(1)) {
        const m = new Set(NGRAMS[ng] || []);
        for (const i of matches) if (!m.has(i)) matches.delete(i);
      }
      return matches;
    }

    function search(query) {
      const terms = query.trim().split(/\s+/).filter(Boolean);
      if (!terms.length) return [];
      let result = searchTerm(terms[0]);
      for (const term of terms.slice(1)) {
        const m = searchTerm(term);
        for (const i of result) if (!m.has(i)) result.delete(i);
      }
      return [...result].map(i => VIDEOS[i]);
    }

    function esc(s) {
      return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    }

    function render(query) {
      const statsEl = document.getElementById("stats");
      const resultsEl = document.getElementById("results");

      if (!query.trim()) {
        resultsEl.innerHTML = '<p class="placeholder">キーワードを入力して検索してください</p>';
        statsEl.textContent = "";
        return;
      }

      const hits = search(query);
      statsEl.textContent = `「${query}」の検索結果：${hits.length} 本`;

      if (!hits.length) {
        resultsEl.innerHTML = '<p class="placeholder">該当する動画が見つかりませんでした</p>';
        return;
      }

      resultsEl.innerHTML = hits.map(v => `
        <a class="card" href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">
          <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="${esc(v.title)}" loading="lazy">
          <div class="card-body">
            <div class="card-title">${esc(v.title)}</div>
          </div>
        </a>
      `).join("");
    }

    function doSearch() {
      const q = document.getElementById("query").value.trim();
      if (!q) return;
      history.pushState({}, "", "results.html?q=" + encodeURIComponent(q));
      render(q);
    }

    document.getElementById("search-btn").addEventListener("click", doSearch);
    document.getElementById("query").addEventListener("keydown", e => {
      if (e.key === "Enter") doSearch();
    });

    (async () => {
      await loadIndex();
      const q = getQuery();
      document.getElementById("query").value = q;
      render(q);
    })();
  </script>
</body>
</html>
