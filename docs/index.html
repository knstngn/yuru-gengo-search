<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゆる言語学ラジオ 字幕検索</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #fff;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .logo {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 32px;
      text-align: center;
    }

    .search-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 560px;
    }

    .search-row input {
      flex: 1;
      padding: 12px 14px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
      font-family: inherit;
    }

    .search-row input:focus {
      border-color: #555;
    }

    .search-row button {
      padding: 12px 22px;
      font-size: 0.95rem;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }

    .search-row button:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <img class="logo" src="logo.jpg" alt="ゆる言語学ラジオ">
  <h1>ゆる言語学ラジオ 字幕検索</h1>
  <p class="subtitle">キーワードで、あの回を探す</p>

  <div class="search-row">
    <input type="text" id="query" placeholder="例：音韻論、借用語、ソシュール…" autocomplete="off">
    <button id="search-btn">検索</button>
  </div>

  <script>
    function doSearch() {
      const q = document.getElementById("query").value.trim();
      if (!q) return;
      location.href = "results.html?q=" + encodeURIComponent(q);
    }

    document.getElementById("search-btn").addEventListener("click", doSearch);
    document.getElementById("query").addEventListener("keydown", e => {
      if (e.key === "Enter") doSearch();
    });
  </script>
</body>
</html>
